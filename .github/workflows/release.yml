name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # setup-node writes //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
      # to .npmrc. When NODE_AUTH_TOKEN is unset, this empty token overrides
      # npm's OIDC trusted publishing. Strip the line so npm uses OIDC.
      - name: Configure npm for OIDC
        run: |
          if [ -f .npmrc ]; then sed -i '/_authToken/d' .npmrc; fi
          if [ -f ~/.npmrc ]; then sed -i '/_authToken/d' ~/.npmrc; fi
          npm config list

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm build

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1.7.0
        with:
          publish: pnpm release
          version: pnpm changeset version
          commit: 'ci: release'
          title: 'ci: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
